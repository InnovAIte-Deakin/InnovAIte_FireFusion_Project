<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FireFusion | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="fusion-login-page">
    <main class="ff-login-shell">
      <div class="ff-login-card">
        <header class="ff-login-hero">
          <div class="ff-login-hero-bg" aria-hidden="true">
            <svg class="ff-hero-waves" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" preserveAspectRatio="none">
              <path fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1" d="M0,60 Q100,20 200,60 T400,55" />
              <path fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1" d="M0,80 Q120,45 240,75 T400,70" />
              <path fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1" d="M0,95 Q80,70 200,90 T400,88" />
            </svg>
            <svg class="ff-hero-trees" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" aria-hidden="true">
              <path fill="rgba(20,60,100,0.45)" d="M120 80 L135 35 L150 80 Z M145 80 L165 25 L185 80 Z M165 80 L180 40 L195 80 Z" />
            </svg>
          </div>

          <div class="ff-login-brand">
            <div class="ff-login-emblem" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" class="ff-emblem-svg">
                <defs>
                  <linearGradient id="ffSky" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#1e5a8a" />
                    <stop offset="100%" style="stop-color:#0a3d6e" />
                  </linearGradient>
                  <linearGradient id="ffField" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#2d8a4e" />
                    <stop offset="100%" style="stop-color:#1a5c36" />
                  </linearGradient>
                </defs>
                <circle cx="32" cy="32" r="30" fill="url(#ffSky)" />
                <ellipse cx="32" cy="44" rx="26" ry="14" fill="url(#ffField)" />
                <path fill="#fbbf24" d="M32 18a6 6 0 1 1 0.01 0z" />
                <path fill="#fcd34d" opacity="0.9" d="M18 38 Q32 32 46 38 L44 42 Q32 36 20 42 Z" />
                <path fill="#f97316" d="M28 8 Q32 2 36 8 Q34 14 32 18 Q30 14 28 8Z" />
                <path fill="#fb923c" d="M24 12 Q28 6 32 10 Q30 16 28 20 Q26 16 24 12Z" />
                <path fill="#ea580c" d="M36 10 Q40 6 44 12 Q40 18 38 20 Q36 16 36 10Z" />
              </svg>
            </div>
            <span class="ff-login-name">FireFusion</span>
          </div>

          <h1 class="ff-login-heading">Login to FireFusion</h1>
          <p class="ff-login-tagline">
            Access your account to monitor bushfires and risk alerts.
          </p>
        </header>

        <form class="ff-login-form" id="loginForm" novalidate>
          <label class="ff-label" for="email">Email</label>
          <div class="ff-field">
            <svg class="ff-field-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input
              type="email"
              id="email"
              name="email"
              class="ff-input"
              autocomplete="username"
              placeholder="Enter your email"
              required
            />
          </div>

          <label class="ff-label" for="password">Password</label>
          <div class="ff-field ff-field-password">
            <svg class="ff-field-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input
              type="password"
              id="password"
              name="password"
              class="ff-input"
              autocomplete="current-password"
              placeholder="Enter your password"
              minlength="6"
              required
            />
            <button
              type="button"
              class="ff-eye"
              id="togglePassword"
              aria-label="Show password"
            >
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>

          <p class="ff-error" id="loginError" role="alert" aria-live="polite"></p>

          <button type="submit" class="ff-btn-login">Login</button>

          <a href="#" class="ff-forgot">Forgot password?</a>

          <p class="ff-signup-line">
            Don't have an account?
            <a href="./signup.html" class="ff-signup-link">Sign Up</a>
          </p>
        </form>
      </div>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
