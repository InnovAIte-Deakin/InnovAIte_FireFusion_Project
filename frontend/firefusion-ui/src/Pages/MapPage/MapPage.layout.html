<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map Page</title>
  <link rel="stylesheet" href="MapPage.layout.CSS" />
</head>

<body>
  <div class="map-page">
    <aside class="sidebar">
      <h2>Menu</h2>
      <ul>
        <li>Dashboard</li>
        <li>Pages</li>
        <li>Settings</li>
      </ul>
    </aside>

    <main class="map-main">
      <div class="map-container" id="map"></div>

      <div class="overlay search">Search Bar</div>
      <div class="overlay zoom">Zoom Controls</div>
      <div class="overlay legend">Legend</div>
    </main>
  </div>

  <script src="MapPage.js"></script>
</body>
</html>
